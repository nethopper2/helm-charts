# Default values for nh-ai-benchmark.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: nethopper/nh-ai-benchmark-api
  # This sets the pull policy for images.
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 8098

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

# -- Expose the service via gateway-api HTTPRoute
# Requires Gateway API resources and suitable controller installed within the cluster
# (see: https://gateway-api.sigs.k8s.io/guides/)
httpRoute:
  # HTTPRoute enabled.
  enabled: false
  # HTTPRoute annotations.
  annotations: {}
  # Which Gateways this Route is attached to.
  parentRefs:
  - name: gateway
    sectionName: http
    # namespace: default
  # Hostnames matching HTTP header.
  hostnames:
  - chart-example.local
  # List of rules and filters applied.
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
livenessProbe:
  httpGet:
    path: /health
    port: 8098
readinessProbe:
  httpGet:
    path: /health
    port: 8098

# This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# -- Persistent storage for the API container (default gp3 StorageClass, dynamically
# provisioned by the EBS CSI driver). Sizes are configurable per-deployment — override
# `size` in values-<env>.yaml. Mount paths match the app's fixed dirs in config.py
# (BENCH_DIR = /app), so do not change them unless the app layout changes.
#
# NOTE: EBS volumes are ReadWriteOnce (single node). The API runs replicaCount: 1, so this
# is fine. If you ever enable the HPA or scale the API > 1, multiple pods cannot share an
# RWO EBS volume — you'd need a shared filesystem (e.g. the JuiceFS S3 gateway) instead.
persistence:
  # Run artifacts written to /app/results (results/<run_id>/). Persist across restarts.
  results:
    enabled: true
    mountPath: /app/results
    # -- PVC size (GiB). Default 1Gi, which is also the EBS minimum. gp3 supports online
    # expansion (allowVolumeExpansion: true), so you can INCREASE this any time (edit + helm
    # upgrade, no downtime). You CANNOT decrease it — shrinking requires a new PVC + data copy.
    # So start small and grow as needed.
    size: 1Gi
    accessMode: ReadWriteOnce
    # -- StorageClass. "" = cluster default (gp3). "-" = disable dynamic provisioning.
    storageClass: ""
    # -- Use an existing PVC instead of creating one (set to a claim name to bind it).
    existingClaim: ""
    annotations: {}
    # -- When true (default), adds the `helm.sh/resource-policy: keep` annotation so the PVC
    # (and, with gp3 reclaimPolicy: Delete, its EBS volume + data) survives `helm uninstall`.
    # Reinstalls with the same release name/namespace reattach the existing data automatically.
    # Set false to have the PVC removed on uninstall (which destroys the EBS volume + data).
    # Retained PVCs are not freed automatically — delete manually (kubectl delete pvc) when no
    # longer needed, as they keep incurring cost. Merges with `annotations`; explicit wins.
    retainOnUninstall: true
  # Per-user editable prompt suites at /app/prompts/workspace (prompts/workspace/<user_id>/).
  # prompts/official and prompts.json ship in the image and are left untouched.
  workspace:
    enabled: true
    mountPath: /app/prompts/workspace
    # -- PVC size (GiB). Can be increased any time (online expansion); cannot be decreased.
    size: 1Gi
    accessMode: ReadWriteOnce
    storageClass: ""
    existingClaim: ""
    annotations: {}
    retainOnUninstall: true

# Additional volumes on the output Deployment definition (merged with persistence volumes above).
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition (merged with persistence mounts above).
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

# -- Environment variables for the API container.
# Sensitive values (OI_API_KEY, AWS_*, QDRANT_API_KEY) should be
# provided via secretName (envFrom) rather than set here in plain text.
# Required values are commented out — deployment will fail if not set, which is intentional.
env:
  # OI_BASE_URL: ""
  # RAG_BASE_URL: ""
  # PIPELINES_BASE_URL: ""
  # MCP_BASE_URL: ""
  # DEFAULT_MODEL: ""
  # QDRANT_URL: ""
  # QDRANT_COLLECTION: ""
  BEDROCK_REGION: "us-east-1"
  BEDROCK_EMBEDDINGS_MODEL: "amazon.titan-embed-text-v2:0"
  CLAUDE_MODEL_ID: "us.anthropic.claude-sonnet-4-6"

# -- List of Kubernetes secret names to mount via envFrom.
# Each secret's keys are injected as env var names, values as env var values.
# Apply all referenced secrets before deploying.
envFromSecrets: []
# envFromSecrets:
#   - nh-ai-benchmark-secrets       # service-specific secrets (OI_API_KEY, etc.)
#   - aws-open-ai-api-key-nethopper # shared AWS credentials (AWS_ACCESS_KEY_ID, etc.)

# -- Additional environment variables for the API container (k8s env var objects).
# Use for vars not covered above, e.g.:
# extraEnvVars:
#   - name: SOME_VAR
#     value: "some-value"
#   - name: SECRET_VAR
#     valueFrom:
#       secretKeyRef:
#         name: my-secret
#         key: my-key
extraEnvVars: []

# -- UI deployment (Astro/Vue frontend served via nginx)
ui:
  enabled: true
  replicaCount: 1
  image:
    repository: nethopper/nh-ai-benchmark-ui
    pullPolicy: IfNotPresent
    tag: ""
  service:
    type: ClusterIP
    port: 4321
    targetPort: 80
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: chart-example.local
        paths:
          - path: /
            pathType: ImplementationSpecific
    tls: []
  httpRoute:
    enabled: false
    annotations: {}
    parentRefs:
    - name: gateway
      sectionName: http
    hostnames:
    - chart-example.local
    rules:
    - matches:
      - path:
          type: PathPrefix
          value: /
  # -- Hostname of the API service for nginx reverse proxy
  benchApiHost: "nh-ai-benchmark"
  resources: {}

