apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nh-ai-benchmark.fullname" . }}
  labels:
    {{- include "nh-ai-benchmark.labels" . | nindent 4 }}
spec:
  {{- with .Values.deploymentStrategy }}
  strategy:
    type: {{ .type }}
    {{- if eq .type "Recreate" }}
    rollingUpdate: null
    {{- end }}
  {{- end }}
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "nh-ai-benchmark.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "nh-ai-benchmark.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "nh-ai-benchmark.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- $persistenceMounts := false }}
          {{- range $name, $cfg := .Values.persistence }}{{- if $cfg.enabled }}{{- $persistenceMounts = true }}{{- end }}{{- end }}
          {{- if or .Values.volumeMounts $persistenceMounts }}
          volumeMounts:
            {{- range $name, $cfg := .Values.persistence }}
            {{- if $cfg.enabled }}
            - name: {{ $name }}
              mountPath: {{ $cfg.mountPath | quote }}
            {{- end }}
            {{- end }}
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          env:
            - name: OI_BASE_URL
              value: {{ required "env.OI_BASE_URL is required" .Values.env.OI_BASE_URL | quote }}
            - name: RAG_BASE_URL
              value: {{ required "env.RAG_BASE_URL is required" .Values.env.RAG_BASE_URL | quote }}
            - name: PIPELINES_BASE_URL
              value: {{ required "env.PIPELINES_BASE_URL is required" .Values.env.PIPELINES_BASE_URL | quote }}
            - name: MCP_BASE_URL
              value: {{ required "env.MCP_BASE_URL is required" .Values.env.MCP_BASE_URL | quote }}
            - name: DEFAULT_MODEL
              value: {{ required "env.DEFAULT_MODEL is required" .Values.env.DEFAULT_MODEL | quote }}
            - name: QDRANT_URL
              value: {{ required "env.QDRANT_URL is required" .Values.env.QDRANT_URL | quote }}
            - name: QDRANT_COLLECTION
              value: {{ required "env.QDRANT_COLLECTION is required" .Values.env.QDRANT_COLLECTION | quote }}
            - name: BEDROCK_REGION
              value: {{ .Values.env.BEDROCK_REGION | quote }}
            - name: BEDROCK_EMBEDDINGS_MODEL
              value: {{ .Values.env.BEDROCK_EMBEDDINGS_MODEL | quote }}
            - name: CLAUDE_MODEL_ID
              value: {{ .Values.env.CLAUDE_MODEL_ID | quote }}

            {{- if .Values.extraEnvVars }}
            {{- toYaml .Values.extraEnvVars | nindent 12 }}
            {{- end }}
          {{- if .Values.envFromSecrets }}
          envFrom:
            {{- range .Values.envFromSecrets }}
            - secretRef:
                name: {{ . }}
            {{- end }}
          {{- end }}
      {{- $persistenceVolumes := false }}
      {{- range $name, $cfg := .Values.persistence }}{{- if $cfg.enabled }}{{- $persistenceVolumes = true }}{{- end }}{{- end }}
      {{- if or .Values.volumes $persistenceVolumes }}
      volumes:
        {{- range $name, $cfg := .Values.persistence }}
        {{- if $cfg.enabled }}
        - name: {{ $name }}
          persistentVolumeClaim:
            claimName: {{ $cfg.existingClaim | default (printf "%s-%s" (include "nh-ai-benchmark.fullname" $) $name) }}
        {{- end }}
        {{- end }}
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
