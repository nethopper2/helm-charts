apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nh-ai-benchmark.fullname" . }}
  labels:
    {{- include "nh-ai-benchmark.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "nh-ai-benchmark.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "nh-ai-benchmark.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "nh-ai-benchmark.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: OI_BASE_URL
              value: {{ .Values.env.OI_BASE_URL | quote }}
            - name: RAG_BASE_URL
              value: {{ .Values.env.RAG_BASE_URL | quote }}
            - name: PIPELINES_BASE_URL
              value: {{ .Values.env.PIPELINES_BASE_URL | quote }}
            - name: MCP_BASE_URL
              value: {{ .Values.env.MCP_BASE_URL | quote }}
            - name: DEFAULT_MODEL
              value: {{ .Values.env.DEFAULT_MODEL | quote }}
            - name: QDRANT_URL
              value: {{ .Values.env.QDRANT_URL | quote }}
            - name: QDRANT_COLLECTION
              value: {{ .Values.env.QDRANT_COLLECTION | quote }}
            - name: BEDROCK_REGION
              value: {{ .Values.env.BEDROCK_REGION | quote }}
            - name: BEDROCK_EMBEDDINGS_MODEL
              value: {{ .Values.env.BEDROCK_EMBEDDINGS_MODEL | quote }}
            - name: CLAUDE_MODEL_ID
              value: {{ .Values.env.CLAUDE_MODEL_ID | quote }}
            - name: OPEN_WEBUI_UID
              value: {{ .Values.env.OPEN_WEBUI_UID | quote }}
            {{- if .Values.extraEnvVars }}
            {{- toYaml .Values.extraEnvVars | nindent 12 }}
            {{- end }}
          {{- if .Values.secretName }}
          envFrom:
            - secretRef:
                name: {{ .Values.secretName }}
          {{- end }}
      {{- with .Values.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
